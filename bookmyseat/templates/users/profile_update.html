{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Profile – BookMySeat{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card" style="max-width:500px;">
        <div class="auth-logo">✏️</div>
        <h1 class="auth-title">EDIT PROFILE</h1>
        <p class="auth-subtitle">Update your personal information</p>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-input" value="{{ form.first_name.value|default:'' }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-input" value="{{ form.last_name.value|default:'' }}">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-input" value="{{ form.phone.value|default:'' }}" placeholder="+91 9999999999">
            </div>
            <div class="form-group">
                <label class="form-label">Date of Birth</label>
                <input type="date" name="date_of_birth" class="form-input" value="{{ form.date_of_birth.value|default:'' }}">
            </div>
            <div class="form-group">
                <label class="form-label">Profile Picture</label>
                {% if user.profile_pic %}
                <div style="margin-bottom:8px;">
                    <img src="{{ user.profile_pic.url }}" alt="Current" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--border);">
                </div>
                {% endif %}
                <input type="file" name="profile_pic" class="form-input" accept="image/*" style="padding:8px;">
            </div>
            <button type="submit" class="btn-auth">Save Changes</button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'profile' %}" style="color:var(--text-muted);">← Back to Profile</a>
        </div>
    </div>
</div>
{% endblock %}
